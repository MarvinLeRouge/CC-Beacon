name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_PATH: /home/mlr/marvinlerouge.dev/cc-beacon
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: GITHUB_SHA,GITHUB_REPOSITORY,DEPLOY_PATH
          script_stop: true
          script: |
            set -Eeuo pipefail

            REPO_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}"

            echo "==> Fetch web/index.html"
            curl -fsSL "${REPO_URL}/web/index.html" \
              -o "${DEPLOY_PATH}/shared/www/index.html"

            echo "==> Fetch web/app.js"
            curl -fsSL "${REPO_URL}/web/app.js" \
              -o "${DEPLOY_PATH}/shared/www/app.js"

            echo "==> Fetch ops/default.conf.template"
            curl -fsSL "${REPO_URL}/ops/default.conf.template" \
              -o "${DEPLOY_PATH}/shared/nginx/default.conf.template"

            echo "==> Fetch docker-compose.prod.yml"
            curl -fsSL "${REPO_URL}/docker-compose.prod.yml" \
              -o "${DEPLOY_PATH}/compose/docker-compose.yml"

            echo "==> Apply"
            cd "${DEPLOY_PATH}/compose"
            docker compose up -d

            echo "==> Deploy complete"
