<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC-Beacon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f5f7;
      --surface:   #ffffff;
      --border:    #e1e4e8;
      --text:      #1a1a2e;
      --muted:     #6b7280;
      --accent:    #2563eb;
      --green:     #16a34a;
      --orange:    #b45309;
      --red:       #dc2626;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #111827;
        --surface: #1f2937;
        --border:  #374151;
        --text:    #f9fafb;
        --muted:   #9ca3af;
        --accent:  #60a5fa;
        --green:   #4ade80;
        --orange:  #fbbf24;
        --red:     #f87171;
        --shadow:  0 1px 3px rgba(0,0,0,.4);
      }
    }
    :root[data-theme="dark"] {
      --bg:      #111827;
      --surface: #1f2937;
      --border:  #374151;
      --text:    #f9fafb;
      --muted:   #9ca3af;
      --accent:  #60a5fa;
      --green:   #4ade80;
      --orange:  #fbbf24;
      --red:     #f87171;
      --shadow:  0 1px 3px rgba(0,0,0,.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    #btn-back {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--accent);
      padding: 12px 16px 12px 0;
      line-height: 1;
      min-width: 44px;
    }
    #refresh-indicator {
      font-size: .75rem;
      color: var(--orange);
      white-space: nowrap;
    }

    /* ── Main ── */
    main { padding: 16px; max-width: 640px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow .15s;
    }
    .card:active { box-shadow: 0 0 0 2px var(--accent); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: .95rem; font-weight: 600; flex: 1; line-height: 1.3; }
    .card-meta { font-size: .75rem; color: var(--muted); margin-top: 4px; }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 10px; }
    .progress-label { display: flex; justify-content: space-between; font-size: .75rem; color: var(--muted); margin-bottom: 4px; }
    .progress-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .3s; }
    @media (prefers-reduced-motion: reduce) {
      .progress-fill { transition: none; }
    }
    .progress-fill.done { background: var(--green); }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      font-size: .75rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .badge-pending     { background: #e5e7eb; color: #374151; }
    .badge-in_progress { background: #dbeafe; color: #1d4ed8; }
    .badge-done        { background: #dcfce7; color: #15803d; }
    .badge-error       { background: #fee2e2; color: #b91c1c; }

    @media (prefers-color-scheme: dark) {
      .badge-pending     { background: #374151; color: #d1d5db; }
      .badge-in_progress { background: #1e3a5f; color: #93c5fd; }
      .badge-done        { background: #14532d; color: #86efac; }
      .badge-error       { background: #7f1d1d; color: #fca5a5; }
      .error-banner      { background: #7f1d1d; color: #fca5a5; }
    }
    :root[data-theme="dark"] .badge-pending     { background: #374151; color: #d1d5db; }
    :root[data-theme="dark"] .badge-in_progress { background: #1e3a5f; color: #93c5fd; }
    :root[data-theme="dark"] .badge-done        { background: #14532d; color: #86efac; }
    :root[data-theme="dark"] .badge-error       { background: #7f1d1d; color: #fca5a5; }
    :root[data-theme="dark"] .error-banner      { background: #7f1d1d; color: #fca5a5; }

    /* ── Steps ── */
    .steps-toggle {
      background: none;
      border: none;
      font-size: .8rem;
      color: var(--accent);
      cursor: pointer;
      margin-top: 10px;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .steps-list {
      margin-top: 8px;
      padding-left: 4px;
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: .8rem;
    }
    .step-icon { flex-shrink: 0; font-size: .85rem; margin-top: 1px; color: var(--muted); }
    .step-icon[data-status="done"]        { color: var(--green); }
    .step-icon[data-status="in_progress"] { color: var(--accent); }
    .step-icon[data-status="error"]       { color: var(--red); }
    .step-label { color: var(--text); line-height: 1.3; }
    .step-at { font-size: .75rem; color: var(--muted); }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      font-size: .85rem;
    }
    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      color: var(--accent);
      font-size: .85rem;
    }
    .pagination button:disabled { color: var(--muted); cursor: default; }

    /* ── Empty / Error states ── */
    .state-empty {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 48px 16px;
    }
    .error-banner {
      background: #fee2e2;
      color: #b91c1c;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: .85rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<header>
  <button id="btn-back" aria-label="Retour">&#8592;</button>
  <h1 id="page-title">CC-Beacon</h1>
  <span id="refresh-indicator" hidden>&#8635; live</span>
</header>
<main id="app"><p class="state-empty">Chargement…</p></main>

<script src="app.js" defer></script>
</body>
</html>
